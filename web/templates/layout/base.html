{{define "base"}}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Samba4</title>
    <!-- CSRF Token for AJAX -->
    <meta name="csrf-token" content="{{.CSRFToken}}">


    <!-- Local Fonts and CSS -->

    <!-- Tailwind v4 and Custom CSS -->
    <!-- For dev/standalone, Tailwind Play CDN can be used, but app.css contains the rules -->
    <link rel="stylesheet" href="/static/css/app.css">

    <!-- jQuery 4.0.0 -->
    <script src="/static/js/jquery.min.js"></script>
    {{block "head_extra" .}}{{end}}
</head>

<body class="bg-[var(--color-base)] text-[var(--color-ink)] min-h-screen flex">
    {{if .Username}}
    {{template "sidebar" .}}
    <main class="flex-1 ml-[240px] px-8 pb-8">
        <header class="h-16 flex justify-between items-center mb-8 border-b-2 border-[var(--color-ink)]">
            <h1 class="text-3xl font-bold uppercase tracking-wide flex items-center gap-2">
                {{block "title" .}}Samba4 Admin{{end}}
            </h1>
            <div class="flex items-center gap-4 font-bold">
                <span class="flex items-center gap-2 px-4 py-2 border-2 border-[var(--color-ink)] bg-[var(--color-surface)] shadow-[1px 1px 0px var(--color-ink)]">
                    <i data-lucide="user" class="lucide-sm"></i>{{.Username}}
                </span>
                <a href="/auth/logout" class="btn-logout">{{ T $.Lang "Btn_Logout" }}</a>
            </div>
        </header>

        <div class="content">
            {{template "content" .}}
        </div>
    </main>
    {{else}}
    <main class="w-full h-screen flex items-start justify-center pt-[10vh]">
        {{template "content" .}}
    </main>
    {{end}}

    <!-- Custom JS -->
    <script>window.AppLang = "{{ $.Lang }}";</script>
    <script src="/static/js/lucide.min.js"></script>
    <script src="/static/js/app.js"></script>
    {{block "scripts" .}}{{end}}
</body>

</html>
{{end}}
