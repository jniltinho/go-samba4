{{define "sidebar"}}
<aside class="sidebar z-40">
    <div class="h-16 flex items-center px-6 border-b-2 border-[var(--color-ink)] bg-[var(--color-primary)] text-white">
        <h2 class="text-xl font-bold uppercase tracking-wider">Go Samba4</h2>
    </div>
    <nav class="mt-2 flex flex-col font-bold">
        <a href="/dashboard" class="sidebar-link {{if hasPrefix $.CurrentPath "/dashboard"}}active{{end}}"><i data-lucide="layout-dashboard"></i> {{ T $.Lang "Nav_Dashboard" }}</a>
        <a href="/users" class="sidebar-link {{if hasPrefix $.CurrentPath "/users"}}active{{end}}"><i data-lucide="users"></i> {{ T $.Lang "Nav_Users" }}</a>
        <a href="/groups" class="sidebar-link {{if hasPrefix $.CurrentPath "/groups"}}active{{end}}"><i data-lucide="shield"></i> {{ T $.Lang "Nav_Groups" }}</a>
        <a href="/ous" class="sidebar-link {{if hasPrefix $.CurrentPath "/ous"}}active{{end}}"><i data-lucide="folder"></i> {{ T $.Lang "Nav_OUs" }}</a>
        <a href="/search" class="sidebar-link {{if hasPrefix $.CurrentPath "/search"}}active{{end}}"><i data-lucide="search"></i> {{ T $.Lang "Nav_Search" }}</a>
        <hr class="border-[var(--color-ink)] border-t-2 my-2 opacity-50">
        <a href="/audit" class="sidebar-link {{if hasPrefix $.CurrentPath "/audit"}}active{{end}}"><i data-lucide="scroll-text"></i> {{ T $.Lang "Nav_AuditLogs" }}</a>
        <a href="/settings" class="sidebar-link {{if hasPrefix $.CurrentPath "/settings"}}active{{end}}"><i data-lucide="settings"></i> {{ T $.Lang "Nav_Settings" }}</a>
        <hr class="border-[var(--color-ink)] border-t-2 my-2 opacity-30">
        <div class="sidebar-lang">
            <a href="/lang/en" class="sidebar-lang-btn {{if eq $.Lang "en"}}active{{end}}">EN</a>
            <a href="/lang/pt" class="sidebar-lang-btn {{if eq $.Lang "pt"}}active{{end}}">PT</a>
            <a href="/lang/es" class="sidebar-lang-btn {{if eq $.Lang "es"}}active{{end}}">ES</a>
        </div>
    </nav>
</aside>
{{end}}
