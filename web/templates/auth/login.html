{{template "base" .}}

{{define "title"}}Login{{end}}

{{define "content"}}
<div class="card max-w-md w-full">
    <h2 class="text-2xl font-bold uppercase border-b-4 border-[var(--color-ink)] pb-2 mb-6 text-center">
        Authentication
    </h2>
    
    {{if .Error}}
    <div class="bg-[var(--color-accent)] text-white p-4 font-bold border-4 border-[var(--color-ink)] shadow-[4px_4px_0px_var(--color-ink)] mb-6">
        ⚠ {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/auth/login" class="flex flex-col gap-6">
        <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
        
        <div class="flex flex-col gap-2">
            <label for="username" class="font-bold uppercase tracking-wider">Username</label>
            <input type="text" id="username" name="username" required class="text-lg w-full" autofocus>
        </div>
        
        <div class="flex flex-col gap-2">
            <label for="password" class="font-bold uppercase tracking-wider">Password</label>
            <input type="password" id="password" name="password" required class="text-lg w-full">
        </div>
        
        <button type="submit" class="btn btn-primary text-lg w-full mt-2 py-3">
            Sign In
        </button>
    </form>
</div>
{{end}}
