{{template "base" .}}

{{define "title"}}{{ T $.Lang "Page_Login" }}{{end}}

{{define "content"}}
<div class="flex flex-col items-center w-full max-w-md">
    <div class="card w-full">
        <h2 class="text-2xl font-bold uppercase border-b-2 border-[var(--color-ink)] pb-2 mb-6 text-center">
            {{ T $.Lang "Label_Authentication" }}
        </h2>

        {{if .Error}}
        <div
            class="bg-[var(--color-accent)] text-white p-4 font-bold border-2 border-[var(--color-ink)] shadow-[1px_1px_0px_var(--color-ink)] mb-6">
            ⚠ {{.Error}}
        </div>
        {{end}}

        <form method="POST" action="/auth/login" class="flex flex-col gap-6">
            <input type="hidden" name="_csrf" value="{{.CSRFToken}}">

            <div class="flex flex-col gap-2">
                <label for="username" class="font-bold uppercase tracking-wider">{{ T $.Lang "Label_Username" }}</label>
                <input type="text" id="username" name="username" required class="text-lg w-full" autofocus>
            </div>

            <div class="flex flex-col gap-2">
                <label for="password" class="font-bold uppercase tracking-wider">{{ T $.Lang "Label_Password" }}</label>
                <input type="password" id="password" name="password" required class="text-lg w-full">
            </div>

            <button type="submit" class="btn btn-primary text-lg w-full mt-2 py-3">
                {{ T $.Lang "Btn_Login" }}
            </button>
        </form>
    </div>

    <p class="text-center mt-5 text-xs text-[var(--color-muted)] font-bold tracking-widest mono">
        &copy; 2026 Go-Samba4 &middot; {{ version }}
    </p>
</div>
{{end}}
