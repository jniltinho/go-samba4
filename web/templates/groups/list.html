{{template "base" .}}

{{define "title"}}Groups List{{end}}

{{define "content"}}
<div class="flex justify-between items-center mb-6">
    <div class="flex gap-4">
        <input type="text" placeholder="Search groups..." class="w-64">
        <button class="btn btn-primary px-6">Filter</button>
    </div>
    <a href="/groups/new" class="btn btn-primary no-underline">+ New Group</a>
</div>

<div class="card p-0 overflow-x-auto">
    <table class="table-brutal w-full whitespace-nowrap">
        <thead>
            <tr>
                <th>Group Name</th>
                <th>Description</th>
                <th>Type</th>
                <th>Members</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody class="mono text-sm">
            {{range .Groups}}
            <tr>
                <td class="font-bold">{{.SAMAccountName}}</td>
                <td>{{.Description}}</td>
                <td>
                    <span class="bg-[var(--color-primary)] text-white px-2 py-1 text-xs uppercase">{{.GroupType}}</span>
                </td>
                <td>{{len .Member}}</td>
                <td>
                    <a href="/groups/{{.SAMAccountName}}/edit" class="btn bg-[#FFF] px-2 py-1 text-xs shadow-[1px 1px 0px var(--color-ink)] mr-2 no-underline">Edit</a>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
