{{template "base" .}}

{{define "title"}}Organizational Units{{end}}

{{define "content"}}
<div class="card max-w-4xl">
    <h3 class="text-xl font-bold uppercase mb-4 border-b-2 border-[var(--color-ink)] pb-2">OU Hierarchy</h3>
    
    <div class="bg-[var(--color-base)] border-2 border-[var(--color-ink)] p-4 font-mono text-sm">
        <ul class="ml-4 list-none border-l-2 border-dashed border-[var(--color-ink)] pl-4">
            <!-- Simplified display logic for now. Actual implementation would build a hierarchical tree structure in Go -->
            {{range .OUs}}
            <li class="mb-2 relative">
                <span class="absolute -left-4 top-2 w-4 border-t-2 border-dashed border-[var(--color-ink)] block"></span>
                <div class="inline-flex items-center gap-2 bg-white px-3 py-1 border-2 border-[var(--color-ink)] shadow-[1px 1px 0px var(--color-ink)]">
                    <span>📁</span>
                    <span class="font-bold">{{.Name}}</span>
                    <span class="text-xs text-[var(--color-muted)]">{{.DN}}</span>
                </div>
            </li>
            {{end}}
        </ul>
    </div>
</div>
{{end}}
